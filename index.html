<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Farm - Image Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
    }
    input[type="file"] {
      margin: 20px 0;
    }
    button {
      background: #27ae60;
      color: white;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #219653;
    }
    #preview {
      max-width: 100%;
      max-height: 300px;
      margin: 20px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
    }
    #status {
      margin-top: 20px;
      font-weight: bold;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <h1>📸 Image Upload Test</h1>
  <p>Select an image to upload to your GitHub repository</p>

  <input type="file" id="fileInput" accept="image/*">
  <br><br>
  <button onclick="uploadImage()">Upload to GitHub</button>

  <img id="preview" alt="Preview">
  <p id="status"></p>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    // Preview image
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        status.textContent = '';
      }
    });

    async function uploadImage() {
      const file = fileInput.files[0];
      if (!file) {
        alert("Please select an image first!");
        return;
      }

      status.textContent = "Uploading... Please wait";

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];

        try {
          // Change this if your Vercel URL is different
          const apiUrl = 'https://upload-xnashers.vercel.app/api/upload';

          const res = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              filename: file.name,
              content: base64,
              message: `Upload ${file.name}`
            })
          });

          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            data = { error: text };
          }

          if (res.ok) {
            status.innerHTML = `✅ Upload Successful!<br><br>
              <strong>Image URL:</strong><br>
              <a href="${data.url}" target="_blank">${data.url}</a>`;
          } else {
            status.innerHTML = `❌ Upload Failed<br>${data.error || res.status}`;
          }
        } catch (err) {
          status.textContent = "❌ Network error - Check console (F12)";
          console.error(err);
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
