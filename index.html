<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Upload</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
    h1 { color: #2c3e50; }
    button { background: #27ae60; color: white; padding: 12px 24px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #219653; }
    #preview { max-width: 100%; max-height: 300px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; }
    #status { margin-top: 20px; font-weight: bold; min-height: 60px; }
  </style>
</head>
<body>
  <h1>📸 Upload Image</h1>
  <input type="file" id="fileInput" accept="image/*">
  <br><br>
  <button onclick="uploadImage()">Upload Image</button>
  <img id="preview" alt="Preview">
  <p id="status"></p>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) preview.src = URL.createObjectURL(file);
    });

    async function uploadImage() {
      const file = fileInput.files[0];
      if (!file) return alert("Select an image first");

      status.textContent = "Uploading...";

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];

        try {
          const res = await fetch('/api/upload', {  // Relative path - no CORS issue
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              filename: file.name,
              content: base64,
              message: `Upload ${file.name}`
            })
          });

          const text = await res.text();
          let data;
          try { data = JSON.parse(text); } catch(e) { data = { error: text }; }

          if (res.ok) {
            status.innerHTML = `✅ Success!<br><a href="${data.url}" target="_blank">${data.url}</a>`;
          } else {
            status.textContent = `❌ ${data.error || res.status}`;
          }
        } catch (err) {
          status.textContent = "❌ Connection failed";
          console.error(err);
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
